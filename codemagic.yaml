workflows:
  react-native-android:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18.x
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
