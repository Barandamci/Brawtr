kind = "mobile"
previewPath = "/"
title = "Braw"
version = "1.0.0"
id = "artifacts/braw"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22053

[services.development]
run = "pnpm --filter @workspace/braw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/braw", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/braw", "run", "serve" ]

[services.env]
PORT = "22053"
BASE_PATH = "/"
